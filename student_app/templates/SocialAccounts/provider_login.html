<!-- templates/socialaccount/provider_login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In with Google</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #2980b9, #6dd5fa);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .card h2 {
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .card p {
            color: #555;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .google-btn {
            background-color: #dd4b39;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.3s ease;
        }

        .google-btn:hover {
            background-color: #c23321;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Sign In Via Google</h2>
        <p>You are about to sign in using a third-party account from Google.</p>
        <a class="google-btn" href="{% provider_login_url 'google' %}">Continue with Google</a>
    </div>
</body>
</html>
